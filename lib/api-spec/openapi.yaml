openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nodus Protocol API — community-powered Web3 security layer
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scan
    description: Threat scanning operations
  - name: threats
    description: Threat intelligence feed
  - name: reports
    description: Community threat reports
  - name: guardians
    description: Guardian network and reputation
  - name: ai
    description: Nodus AI security assistant
  - name: dao
    description: DAO governance proposals and voting
  - name: developers
    description: Developer API key management
  - name: public
    description: Public developer API (X-API-Key authenticated)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /scan:
    post:
      operationId: scanTarget
      tags: [scan]
      summary: Scan a target for security threats
      description: Scans a website, wallet, contract, token, or social account using VirusTotal and GoPlus, returning a real security score.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanInput"
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /scan/stats:
    get:
      operationId: getScanStats
      tags: [scan]
      summary: Platform-wide security statistics
      description: Aggregated counts of threats detected, reports submitted, and guardians active.
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"
  /threats:
    get:
      operationId: listThreats
      tags: [threats]
      summary: Public threat feed
      description: Returns verified threats from the community database.
      parameters:
        - name: threatType
          in: query
          required: false
          schema:
            type: string
        - name: severity
          in: query
          required: false
          schema:
            type: string
        - name: dateFrom
          in: query
          required: false
          description: Only include threats created on or after this ISO 8601 timestamp.
          schema:
            type: string
        - name: dateTo
          in: query
          required: false
          description: Only include threats created on or before this ISO 8601 timestamp.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of threats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Threat"
  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List community reports
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: wallet
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: submitReport
      tags: [reports]
      summary: Submit a new threat report
      description: A Guardian submits a threat report tied to their wallet address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /guardians/connect:
    post:
      operationId: connectGuardian
      tags: [guardians]
      summary: Register or fetch a Guardian by wallet
      description: Registers a wallet as a Guardian, or returns the existing Guardian profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuardianConnectInput"
      responses:
        "200":
          description: Guardian profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guardian"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /guardians/leaderboard:
    get:
      operationId: getGuardianLeaderboard
      tags: [guardians]
      summary: Top Guardians by reputation
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guardian"
  /guardians/{wallet}:
    get:
      operationId: getGuardian
      tags: [guardians]
      summary: Get a Guardian profile by wallet
      parameters:
        - name: wallet
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Guardian profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardianProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /ai/analyze:
    post:
      operationId: analyzeWithAI
      tags: [ai]
      summary: Nodus AI security analysis
      description: Analyzes a target using GPT-4 combined with real threat intelligence, returning plain-language risk analysis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAnalyzeInput"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalyzeResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /dao/proposals:
    get:
      operationId: listProposals
      tags: [dao]
      summary: List governance proposals
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, passed, rejected]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposal"
    post:
      operationId: createProposal
      tags: [dao]
      summary: Create a governance proposal
      description: Creates a proposal. Requires a wallet signature binding the proposal title to prevent forgery.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalInput"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Wallet signature invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Signature already used (replay)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /dao/proposals/{id}:
    get:
      operationId: getProposal
      tags: [dao]
      summary: Get a proposal with its votes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proposal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /dao/proposals/{id}/vote:
    post:
      operationId: voteOnProposal
      tags: [dao]
      summary: Vote on a proposal
      description: Casts a vote (one per wallet per proposal). Requires a wallet signature binding the proposal id and choice.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteInput"
      responses:
        "201":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Wallet signature invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Signature already used (replay)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /developers/keys:
    get:
      operationId: listApiKeys
      tags: [developers]
      summary: List API keys for a wallet
      description: Returns key metadata only (prefix, usage). The full key is never returned after creation.
      parameters:
        - name: wallet
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeyMeta"
    post:
      operationId: createApiKey
      tags: [developers]
      summary: Create a developer API key
      description: Issues a new API key for the public Nodus API. Requires a wallet signature. The plaintext key is returned once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyInput"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreated"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Wallet signature invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Signature already used (replay)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /developers/keys/revoke:
    post:
      operationId: revokeApiKey
      tags: [developers]
      summary: Revoke a developer API key
      description: Revokes an API key owned by the signing wallet. Requires a wallet signature binding the key id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyRevokeInput"
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyMeta"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Wallet signature invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Signature already used (replay)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /pool/stats:
    get:
      operationId: getPoolStats
      tags: [pool]
      summary: Security Pool & Treasury statistics
      description: Derived balances and category breakdown aggregated from the append-only pool ledger.
      responses:
        "200":
          description: Pool statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolStats"
  /pool/ledger:
    get:
      operationId: listPoolLedger
      tags: [pool]
      summary: List pool ledger entries
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Ledger entries, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PoolLedgerEntry"
  /pool/bounties:
    get:
      operationId: listBounties
      tags: [pool]
      summary: List bug bounty programs
      responses:
        "200":
          description: Bounty programs with submission counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bounty"
  /pool/bounties/{id}:
    get:
      operationId: getBounty
      tags: [pool]
      summary: Get a bounty program with public submissions
      description: Vulnerability descriptions are never exposed here — only submission metadata.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bounty detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BountyDetail"
        "404":
          description: Bounty not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /pool/bounties/{id}/submissions:
    post:
      operationId: submitBountyReport
      tags: [pool]
      summary: Submit a vulnerability report to a bounty program
      description: Trust-bearing action. Requires a wallet signature binding the bounty id and report title so the signature cannot be replayed or reused for different content.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BountySubmissionInput"
      responses:
        "201":
          description: Submission recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BountySubmission"
        "400":
          description: Invalid input or bounty closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Wallet signature invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Bounty not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Signature already used (replay)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/scan:
    post:
      operationId: publicScan
      tags: [public]
      summary: "Public API: scan a target"
      description: Requires an X-API-Key header. Same scan engine as the first-party scanner.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanInput"
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing, invalid, or revoked API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Daily quota exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/threats:
    get:
      operationId: publicListThreats
      tags: [public]
      summary: "Public API: verified threat feed"
      security:
        - ApiKeyAuth: []
      parameters:
        - name: threatType
          in: query
          required: false
          schema:
            type: string
        - name: severity
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Verified threats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Threat"
        "401":
          description: Missing, invalid, or revoked API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Daily quota exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/stats:
    get:
      operationId: publicStats
      tags: [public]
      summary: "Public API: platform statistics"
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStats"
        "401":
          description: Missing, invalid, or revoked API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Daily quota exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    ScanInput:
      type: object
      properties:
        target:
          type: string
          description: The URL, wallet address, contract address, token address, or social handle to scan.
        targetType:
          type: string
          enum: [website, wallet, contract, token, social]
      required:
        - target
        - targetType
    ScanSourceResult:
      type: object
      properties:
        source:
          type: string
        available:
          type: boolean
        score:
          type: integer
        summary:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
        - source
        - available
    ScanResult:
      type: object
      properties:
        target:
          type: string
        targetType:
          type: string
        score:
          type: integer
          description: Overall security score 0-100 (higher is safer).
        verdict:
          type: string
          enum: [safe, caution, danger]
        sources:
          type: array
          items:
            $ref: "#/components/schemas/ScanSourceResult"
        communityReports:
          type: integer
        knownThreat:
          type: boolean
      required:
        - target
        - targetType
        - score
        - verdict
        - sources
        - communityReports
        - knownThreat
    PlatformStats:
      type: object
      properties:
        totalThreats:
          type: integer
        totalReports:
          type: integer
        totalGuardians:
          type: integer
        phishingCount:
          type: integer
        drainerCount:
          type: integer
        scamCount:
          type: integer
      required:
        - totalThreats
        - totalReports
        - totalGuardians
        - phishingCount
        - drainerCount
        - scamCount
    Threat:
      type: object
      properties:
        id:
          type: integer
        target:
          type: string
        targetType:
          type: string
        threatType:
          type: string
        severity:
          type: string
        score:
          type: integer
        source:
          type: string
        description:
          type: string
          nullable: true
        evidenceUrl:
          type: string
          nullable: true
        verified:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - target
        - targetType
        - threatType
        - severity
        - score
        - source
        - verified
        - createdAt
    ReportInput:
      type: object
      properties:
        reporterWallet:
          type: string
        target:
          type: string
        targetType:
          type: string
          enum: [website, wallet, contract, token, social]
        threatType:
          type: string
          enum: [phishing, drainer, scam, rugpull, fake_token, fake_social, malicious_contract, other]
        description:
          type: string
        evidenceUrl:
          type: string
        message:
          type: string
          description: The exact UTF-8 message that was signed by the reporter's wallet.
        signature:
          type: string
          description: Base58 ed25519 signature of `message` produced by the reporter's Phantom wallet.
      required:
        - reporterWallet
        - target
        - targetType
        - threatType
        - message
        - signature
    Report:
      type: object
      properties:
        id:
          type: integer
        reporterWallet:
          type: string
        target:
          type: string
        targetType:
          type: string
        threatType:
          type: string
        description:
          type: string
          nullable: true
        evidenceUrl:
          type: string
          nullable: true
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - reporterWallet
        - target
        - targetType
        - threatType
        - status
        - createdAt
    GuardianConnectInput:
      type: object
      properties:
        walletAddress:
          type: string
        message:
          type: string
          description: The exact UTF-8 message signed by the wallet to prove ownership.
        signature:
          type: string
          description: Base58 ed25519 signature of `message` produced by the wallet's Phantom wallet.
      required:
        - walletAddress
        - message
        - signature
    Guardian:
      type: object
      properties:
        id:
          type: integer
        walletAddress:
          type: string
        tier:
          type: string
        reputation:
          type: integer
        reportsSubmitted:
          type: integer
        reportsApproved:
          type: integer
        joinedAt:
          type: string
          format: date-time
      required:
        - id
        - walletAddress
        - tier
        - reputation
        - reportsSubmitted
        - reportsApproved
        - joinedAt
    ReputationEvent:
      type: object
      properties:
        id:
          type: integer
        guardianWallet:
          type: string
        eventType:
          type: string
        points:
          type: integer
        reason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - guardianWallet
        - eventType
        - points
        - createdAt
    GuardianProfile:
      type: object
      properties:
        guardian:
          $ref: "#/components/schemas/Guardian"
        recentReports:
          type: array
          items:
            $ref: "#/components/schemas/Report"
        reputationHistory:
          type: array
          items:
            $ref: "#/components/schemas/ReputationEvent"
      required:
        - guardian
        - recentReports
        - reputationHistory
    AIAnalyzeInput:
      type: object
      properties:
        target:
          type: string
        targetType:
          type: string
          enum: [website, wallet, contract, token, social]
        question:
          type: string
          description: Optional user question, e.g. "Is this safe?"
      required:
        - target
        - targetType
    AIAnalyzeResult:
      type: object
      properties:
        target:
          type: string
        verdict:
          type: string
          enum: [safe, caution, danger]
        score:
          type: integer
        analysis:
          type: string
          description: Plain-language risk analysis from Nodus AI.
        recommendations:
          type: array
          items:
            type: string
      required:
        - target
        - verdict
        - score
        - analysis
        - recommendations
    ProposalInput:
      type: object
      properties:
        title:
          type: string
          minLength: 8
          maxLength: 160
        description:
          type: string
          minLength: 20
          maxLength: 5000
        category:
          type: string
          enum: [protocol, treasury, security, community, other]
        proposerWallet:
          type: string
        durationDays:
          type: integer
          minimum: 1
          maximum: 30
          description: Voting window length in days (1-30).
        message:
          type: string
          description: The exact UTF-8 message signed by the proposer's wallet.
        signature:
          type: string
          description: Base58 ed25519 signature of `message`.
      required:
        - title
        - description
        - category
        - proposerWallet
        - durationDays
        - message
        - signature
    Proposal:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        proposerWallet:
          type: string
